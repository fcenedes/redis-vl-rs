name: Security

on:
  pull_request:
  schedule:
    - cron: "0 4 * * 1"

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo tools
        run: |
          cargo install cargo-audit --locked
          cargo install cargo-deny --locked
      - name: cargo audit
        run: cargo audit
      - name: cargo deny
        run: cargo deny check

