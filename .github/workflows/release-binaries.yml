name: Release Binaries

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to create/use, for example v0.1.1"
        required: true
        type: string
      title:
        description: "Release title"
        required: false
        type: string
      prerelease:
        description: "Mark the GitHub Release as a prerelease"
        required: true
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  release:
    name: Prepare GitHub Release
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.release.outputs.tag }}
    steps:
      - id: release
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "tag=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: github.event_name == 'workflow_dispatch'
        with:
          fetch-depth: 0

      - name: Create tag if needed
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch --tags
          if ! git rev-parse "${{ inputs.tag }}" >/dev/null 2>&1; then
            git tag "${{ inputs.tag }}"
            git push origin "${{ inputs.tag }}"
          fi

      - name: Create GitHub Release if needed
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TITLE: ${{ inputs.title }}
        shell: bash
        run: |
          if gh release view "${{ inputs.tag }}" >/dev/null 2>&1; then
            exit 0
          fi

          args=(gh release create "${{ inputs.tag }}")
          if [ -n "$RELEASE_TITLE" ]; then
            args+=(--title "$RELEASE_TITLE")
          else
            args+=(--title "${{ inputs.tag }}")
          fi
          args+=(--generate-notes)
          if [ "${{ inputs.prerelease }}" = "true" ]; then
            args+=(--prerelease)
          fi
          "${args[@]}"

  build-rvl:
    name: Build rvl (${{ matrix.os }})
    needs: release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: rvl-linux-x86_64
            binary: target/release/rvl
          - os: macos-latest
            artifact: rvl-macos-aarch64
            binary: target/release/rvl
          - os: windows-latest
            artifact: rvl-windows-x86_64.exe
            binary: target/release/rvl.exe
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release.outputs.tag }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build rvl
        run: cargo build -p rvl --release --locked
      - name: Stage artifact
        shell: bash
        run: |
          mkdir -p dist
          cp "${{ matrix.binary }}" "dist/${{ matrix.artifact }}"
      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}
      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release.outputs.tag }}
          files: dist/${{ matrix.artifact }}
