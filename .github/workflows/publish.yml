name: Publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  verify:
    name: Verify release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install security tools
        run: |
          cargo install cargo-audit --locked
          cargo install cargo-deny --locked

      - name: Check release tag matches Cargo version
        if: github.event_name == 'push'
        shell: bash
        run: |
          version="$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "redis-vl") | .version')"
          tag="${GITHUB_REF_NAME#v}"
          if [ "$version" != "$tag" ]; then
            echo "Tag $GITHUB_REF_NAME does not match Cargo version $version"
            exit 1
          fi

      - name: Format
        run: cargo fmt --all --check

      - name: Check all features
        run: cargo check --workspace --all-features

      - name: Test all features
        run: cargo test --workspace --all-features

      - name: Build docs
        run: cargo doc --workspace --all-features --no-deps
        env:
          RUSTDOCFLAGS: "-D warnings"

      - name: Security audit
        run: cargo audit

      - name: License and advisory policy
        run: cargo deny check

      - name: Package redis-vl
        run: cargo package -p redis-vl

  publish:
    name: Publish crates
    needs: verify
    runs-on: ubuntu-latest
    environment: crates-io
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Resolve release version
        id: version
        shell: bash
        run: |
          version="$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "redis-vl") | .version')"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

      - name: Check current crates.io state
        id: crates
        shell: bash
        run: |
          crate_version_exists() {
            local crate="$1"
            local version="$2"

            if curl --fail --silent --show-error --location \
              "https://crates.io/api/v1/crates/${crate}/${version}" \
              >/dev/null; then
              echo "${crate} ${version} is already published"
              return 0
            fi
            echo "${crate} ${version} is not published yet"
            return 1
          }

          if crate_version_exists redis-vl "${{ steps.version.outputs.version }}"; then
            echo "redis_vl_published=true" >> "$GITHUB_OUTPUT"
          else
            echo "redis_vl_published=false" >> "$GITHUB_OUTPUT"
          fi

          if crate_version_exists rvl "${{ steps.version.outputs.version }}"; then
            echo "rvl_published=true" >> "$GITHUB_OUTPUT"
          else
            echo "rvl_published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Dry-run redis-vl publish
        if: steps.crates.outputs.redis_vl_published != 'true'
        run: cargo publish -p redis-vl --dry-run
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish redis-vl
        if: github.event_name == 'push' && steps.crates.outputs.redis_vl_published != 'true'
        shell: bash
        run: |
          set +e
          output="$(cargo publish -p redis-vl 2>&1)"
          status=$?
          set -e
          echo "$output"

          if [ "$status" -eq 0 ]; then
            exit 0
          fi

          if grep -q "already exists on crates.io index" <<< "$output"; then
            echo "redis-vl ${{ steps.version.outputs.version }} is already published; continuing"
            exit 0
          fi

          exit "$status"
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait until rvl can resolve redis-vl
        if: github.event_name == 'push' && steps.crates.outputs.rvl_published != 'true'
        shell: bash
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          for attempt in {1..120}; do
            set +e
            output="$(cargo publish -p rvl --dry-run 2>&1)"
            status=$?
            set -e
            echo "$output"

            if [ "$status" -eq 0 ]; then
              exit 0
            fi

            if grep -q "already exists on crates.io index" <<< "$output"; then
              echo "rvl ${{ steps.version.outputs.version }} is already published; continuing"
              exit 0
            fi

            echo "rvl cannot resolve redis-vl ${{ steps.version.outputs.version }} yet; waiting ($attempt/120)..."
            sleep 15
          done

          echo "rvl could not resolve redis-vl ${{ steps.version.outputs.version }} in time"
          exit 1

      - name: Publish rvl
        if: github.event_name == 'push' && steps.crates.outputs.rvl_published != 'true'
        shell: bash
        run: |
          set +e
          output="$(cargo publish -p rvl 2>&1)"
          status=$?
          set -e
          echo "$output"

          if [ "$status" -eq 0 ]; then
            exit 0
          fi

          if grep -q "already exists on crates.io index" <<< "$output"; then
            echo "rvl ${{ steps.version.outputs.version }} is already published; continuing"
            exit 0
          fi

          exit "$status"
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Create GitHub Release
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          if gh release view "${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            exit 0
          fi
          gh release create "${{ steps.version.outputs.tag }}" \
            --title "${{ steps.version.outputs.tag }}" \
            --generate-notes
