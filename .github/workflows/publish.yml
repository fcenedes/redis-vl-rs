name: Publish

on:
  workflow_dispatch:
    inputs:
      package:
        description: "Package to publish"
        required: true
        default: "redis-vl"
        type: choice
        options:
          - redis-vl
          - rvl
      dry_run:
        description: "Run cargo publish --dry-run instead of publishing"
        required: true
        default: true
        type: boolean

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: crates-io
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Verify package
        run: cargo publish -p "${{ inputs.package }}" --dry-run
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish package
        if: ${{ !inputs.dry_run }}
        run: cargo publish -p "${{ inputs.package }}"
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
